<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule Board</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a22;
      --panel2: #20242f;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --border: #2d3340;
      --accent: #6aa6ff;
      --event-red: #ff5b5b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 17, 23, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px;
    }

    .month-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--panel2);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:active { transform: scale(0.98); }

    .date-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
      scrollbar-width: none;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }

    .date-strip.dragging {
      cursor: grabbing;
    }

    .date-strip::-webkit-scrollbar { display: none; }

    .date-btn {
      position: relative;
      flex: 0 0 56px;
      min-width: 56px;
      padding: 8px 6px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
    }

    .date-btn.has-events {
      border: 2px solid var(--event-red);
      box-shadow: 0 0 0 1px rgba(255, 91, 91, 0.15);
    }

    .date-btn.active {
      background: var(--accent);
      color: #06101f;
      border-color: var(--accent);
    }

    .date-btn.active.has-events {
      border: 2px solid var(--event-red);
      box-shadow: inset 0 0 0 2px rgba(6, 16, 31, 0.35), 0 0 0 1px rgba(255, 91, 91, 0.5);
    }

    .date-btn .day {
      font-size: 18px;
      font-weight: 800;
    }

    .date-btn .week { font-size: 12px; }

    main {
      padding: 12px;
      padding-bottom: 96px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .search {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 11px;
      font-size: 16px;
      min-width: 0;
    }

    .section-title {
      color: var(--muted);
      font-size: 13px;
      margin: 10px 0;
    }

    .event-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 7px solid var(--card-color, #6aa6ff);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .event-time {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .event-title {
      font-size: 18px;
      font-weight: 850;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .place-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 8px;
      align-items: center;
    }

    .place-main { color: var(--text); }

    .place-sub,
    .place-address {
      color: #d1d5db;
      font-size: 14px;
      font-weight: 650;
    }

    .place-address {
      padding: 1px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
    }

    .key-line {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #f3f4f6;
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
      margin-bottom: 2px;
    }

    .key-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .event-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .fab {
      position: fixed;
      right: 16px;
      bottom: 18px;
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: var(--accent);
      color: #06101f;
      font-size: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 15;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      z-index: 20;
    }

    .sheet-backdrop.show { display: block; }

    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 100vw;
      max-height: 92vh;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--panel);
      border-radius: 22px 22px 0 0;
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .sheet h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 10px 0 4px;
    }

    input, textarea, select {
      width: 100%;
      max-width: 100%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 12px;
      padding: 11px;
      font-size: 16px;
      min-width: 0;
    }

    input[type="date"] {
      -webkit-appearance: none;
      appearance: none;
      display: block;
      min-width: 0;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    .time-after-date {
      margin-top: 12px;
    }

    .time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 6px;
      width: 100%;
      align-items: center;
    }

    .time-row > div {
      min-width: 0;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 5px;
      align-items: center;
    }

    .time-row label {
      margin: 0;
      font-size: 12px;
      white-space: nowrap;
    }

    .time-row input[type="time"] {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 38px;
      line-height: 1;
      font-size: 14px;
      padding: 6px 4px;
      letter-spacing: -0.06em;
      -webkit-appearance: none;
      appearance: none;
    }

    .time-row input[type="time"]::-webkit-calendar-picker-indicator {
      margin-left: -6px;
      padding: 0;
      width: 14px;
      height: 14px;
    }

    .date-input {
      font-size: 16px;
      padding-left: 10px;
      padding-right: 10px;
      height: 42px;
    }

    @media (max-width: 340px) {
      .time-row {
        gap: 4px;
      }

      .time-row label {
        font-size: 11px;
      }

      .time-row input[type="time"] {
        font-size: 13px;
        padding-left: 3px;
        padding-right: 2px;
      }
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.75fr);
      gap: 8px;
    }

    .place-detail-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.8fr);
      gap: 8px;
    }

    .select-add-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .add-small {
      white-space: nowrap;
      height: 46px;
      padding: 0 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .save {
      background: var(--accent);
      color: #06101f;
    }

    .delete {
      background: #3a1d22;
      color: #ff9aa2;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      margin-top: 40px;
    }

    .backup-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .palette {
      display: flex;
      gap: 10px;
      padding: 6px 0 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .palette::-webkit-scrollbar { display: none; }

    .color-dot {
      width: 34px;
      height: 34px;
      min-width: 34px;
      border-radius: 999px;
      border: 3px solid transparent;
      padding: 0;
      background: var(--dot);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18);
    }

    .color-dot.selected {
      border-color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 6px;
    }

    @media (min-width: 720px) {
      body {
        max-width: 720px;
        margin: 0 auto;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        min-height: 100vh;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="month-row">
    <button id="prevMonth">＜</button>
    <strong id="monthLabel">2026年5月</strong>
    <button id="nextMonth">＞</button>
  </div>

  <div class="date-strip" id="dateStrip"></div>
</header>

<main>
  <div class="toolbar">
    <input class="search" id="searchInput" placeholder="物件名・会社名・利用者・内容で検索">
    <button id="todayBtn">今日</button>
  </div>

  <div class="backup-row">
    <button id="exportBtn">バックアップ</button>
    <button id="importBtn">復元</button>
  </div>
  <input id="importFile" type="file" accept="application/json" hidden>

  <div class="section-title" id="selectedDateLabel"></div>
  <div id="eventList"></div>
</main>

<button class="fab" id="addBtn">＋</button>

<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet">
    <h2 id="sheetTitle">予定を追加</h2>

    <input type="hidden" id="eventId">

    <label>カード枠の色</label>
    <div class="palette" id="colorPalette"></div>

    <label>日付</label>
    <input type="date" id="dateInput" class="date-input">

    <div class="time-row time-after-date">
      <div>
        <label>開始</label>
        <input type="time" id="startInput">
      </div>
      <div>
        <label>終了</label>
        <input type="time" id="endInput">
      </div>
    </div>

    <label>場所・物件</label>
    <div class="select-add-row">
      <select id="placeInput"></select>
      <button class="add-small" id="addPlaceBtn" type="button">追加</button>
    </div>
    <div class="place-detail-row">
      <div>
        <label>建物名・屋号など</label>
        <input id="placeSubInput" placeholder="例：ウエストヒルズ邸">
      </div>
      <div>
        <label>住所・番号など</label>
        <input id="placeAddressInput" placeholder="例：1049-3">
      </div>
    </div>

    <label>鍵番号</label>
    <input id="keyNumberInput" placeholder="例：1234 / キーボックスA">

    <div class="hint">場所を選ぶと登録済みの建物名・番号・鍵番号が自動入力されます。追加ボタンは通常タップで新規追加、長押しで選択中の項目を編集できます。編集時に最初の項目名を空にすると削除します。</div>

    <label>会社名</label>
    <div class="select-add-row">
      <select id="companyInput"></select>
      <button class="add-small" id="addCompanyBtn" type="button">追加</button>
    </div>

    <div class="form-row">
      <div>
        <label>利用者</label>
        <input id="userInput" placeholder="例：山田">
      </div>
      <div>
        <label>人数</label>
        <select id="peopleInput"></select>
      </div>
    </div>

    <label>内容</label>
    <div class="select-add-row">
      <select id="contentInput"></select>
      <button class="add-small" id="addContentBtn" type="button">追加</button>
    </div>

    <label>メモ</label>
    <textarea id="noteInput" placeholder="備考を入力"></textarea>

    <div class="actions">
      <button class="delete" id="deleteBtn">削除</button>
      <button class="save" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "mobile_schedule_events";
  const SETTINGS_KEY = "mobile_schedule_settings";

  const DEFAULT_COMPANIES = ["AirBnB", "オーナー"];
  const DEFAULT_CONTENTS = ["チェックイン", "清掃"];

  const CARD_COLORS = [
    "#6aa6ff",
    "#ff5b5b",
    "#ffd166",
    "#7bd88f",
    "#c084fc",
    "#ff9f43",
    "#4dd4ac"
  ];

  const DEFAULT_PLACE_ITEMS = [
    { name: "レイクウエスト 4-711", sub: "ウエストヒルズ邸", address: "1049-3", key: "" },
    { name: "湖辺のくつろぎ、時々サウナ (4-656)", sub: "由井邸", address: "1039-7", key: "" },
    { name: "LAKE Terrace 6-904", sub: "早坂邸", address: "1432-179", key: "" },
    { name: "TAKASHIMA BEST SO (4-625/626)", sub: "加藤邸", address: "1039-90", key: "" },
    { name: "風車村 びわ湖の家 1011 (4-657)", sub: "伊藤邸", address: "1039-96", key: "" },
    { name: "湖Co (12-20)", sub: "高橋邸", address: "1431-29", key: "" },
    { name: "LAKE Terrace 4-661", sub: "堂阪邸", address: "1039-74", key: "" }
  ];

  let current = new Date();
  let selectedDate = toDateString(new Date());
  let selectedColor = CARD_COLORS[0];
  let settings = loadSettings();
  let events = loadEvents();

  let renderedStartMonth = null;
  let renderedEndMonth = null;
  let isExtendingDateStrip = false;

  const dateStrip = document.getElementById("dateStrip");
  const monthLabel = document.getElementById("monthLabel");
  const selectedDateLabel = document.getElementById("selectedDateLabel");
  const eventList = document.getElementById("eventList");
  const searchInput = document.getElementById("searchInput");

  const sheetBackdrop = document.getElementById("sheetBackdrop");
  const sheetTitle = document.getElementById("sheetTitle");

  const eventId = document.getElementById("eventId");
  const colorPalette = document.getElementById("colorPalette");
  const dateInput = document.getElementById("dateInput");
  const startInput = document.getElementById("startInput");
  const endInput = document.getElementById("endInput");
  const placeInput = document.getElementById("placeInput");
  const placeSubInput = document.getElementById("placeSubInput");
  const placeAddressInput = document.getElementById("placeAddressInput");
  const keyNumberInput = document.getElementById("keyNumberInput");
  const companyInput = document.getElementById("companyInput");
  const userInput = document.getElementById("userInput");
  const peopleInput = document.getElementById("peopleInput");
  const contentInput = document.getElementById("contentInput");
  const noteInput = document.getElementById("noteInput");

  document.getElementById("prevMonth").onclick = () => {
    current.setMonth(current.getMonth() - 1);
    selectedDate = toDateString(new Date(current.getFullYear(), current.getMonth(), 1));
    resetDateWindowAroundCurrent();
    render();
  };

  document.getElementById("nextMonth").onclick = () => {
    current.setMonth(current.getMonth() + 1);
    selectedDate = toDateString(new Date(current.getFullYear(), current.getMonth(), 1));
    resetDateWindowAroundCurrent();
    render();
  };

  document.getElementById("todayBtn").onclick = () => {
    current = new Date();
    selectedDate = toDateString(new Date());
    resetDateWindowAroundCurrent();
    render();
    scrollActiveDateIntoView();
  };

  document.getElementById("addBtn").onclick = () => openSheet();

  placeInput.addEventListener("change", () => {
    const item = getPlaceItem(placeInput.value);
    if (!item) return;
    placeSubInput.value = item.sub || "";
    placeAddressInput.value = item.address || "";
    keyNumberInput.value = item.key || "";
  });

  setupAddDeleteButton("addCompanyBtn", "companies", "会社名を追加", companyInput, renderCompanyOptions);
  setupAddDeleteButton("addContentBtn", "contents", "内容を追加", contentInput, renderContentOptions);
  setupPlaceAddDeleteButton();

  sheetBackdrop.addEventListener("click", e => {
    if (e.target === sheetBackdrop) closeSheet();
  });

  document.getElementById("saveBtn").onclick = saveEvent;
  document.getElementById("deleteBtn").onclick = deleteEvent;
  searchInput.oninput = renderEvents;

  document.getElementById("exportBtn").onclick = exportBackup;
  document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
  document.getElementById("importFile").onchange = importBackup;

  function render() {
    renderDates();
    renderEvents();
  }

  function renderDates(keepScroll = false) {
    const previousScrollLeft = dateStrip.scrollLeft;

    // 初回は「前月・当月・翌月」の3か月分を描画。
    // 端に近づいたら setupDateStripDragScroll 側で3か月ずつ追加する。
    if (!renderedStartMonth || !renderedEndMonth) {
      renderedStartMonth = monthStart(addMonths(current, -1));
      renderedEndMonth = monthStart(addMonths(current, 1));
    }

    rebuildDateStrip();

    if (keepScroll) {
      dateStrip.scrollLeft = previousScrollLeft;
    } else {
      scrollCurrentMonthStartIntoView();
    }

    updateMonthLabelByStripCenter();
  }

  function renderEvents() {
    const keyword = searchInput.value.trim().toLowerCase();

    const dayEvents = events
      .filter(e => e.date === selectedDate)
      .filter(e => {
        if (!keyword) return true;
        const text = [
          e.content, e.title, e.place, e.placeSub, e.placeAddress, e.keyNumber,
          e.company, e.assignee, e.user, e.note
        ].join(" ").toLowerCase();
        return text.includes(keyword);
      })
      .sort((a, b) => (a.startTime || "").localeCompare(b.startTime || ""));

    selectedDateLabel.textContent = formatDateLabel(selectedDate);
    eventList.innerHTML = "";

    if (dayEvents.length === 0) {
      eventList.innerHTML = `<div class="empty">この日の予定はありません</div>`;
      return;
    }

    for (const ev of dayEvents) {
      const company = ev.company || ev.assignee || "-";
      const content = ev.content || ev.title || "-";
      const card = document.createElement("div");
      card.className = "event-card";
      card.style.setProperty("--card-color", ev.color || CARD_COLORS[0]);
      const timeLine = (ev.startTime || ev.endTime)
        ? `<div class="event-time">${ev.startTime || ""}${ev.startTime && ev.endTime ? " - " : ""}${ev.endTime || ""}</div>`
        : "";

      card.innerHTML = `
        <div class="event-title">
          <div class="place-line">
            <span class="place-main">${escapeHtml(ev.place || "場所未設定")}</span>
            ${ev.placeSub ? `<span class="place-sub">${escapeHtml(ev.placeSub)}</span>` : ""}
            ${ev.placeAddress ? `<span class="place-address">${escapeHtml(ev.placeAddress)}</span>` : ""}
          </div>
        </div>
        ${ev.keyNumber ? `<div class="key-line"><span class="key-label">鍵</span>${escapeHtml(ev.keyNumber)}</div>` : ""}
        ${timeLine}
        <div class="event-meta">
          内容：${escapeHtml(content)}<br>
          会社：${escapeHtml(company)} / 利用者：${escapeHtml(formatUserName(ev.user) || "-")}${ev.people ? " / " + ev.people + "名" : ""}<br>
          ${ev.note ? "メモ：" + escapeHtml(ev.note) : ""}
        </div>
      `;
      card.onclick = () => openSheet(ev);
      eventList.appendChild(card);
    }
  }

  function openSheet(ev = null) {
    sheetTitle.textContent = ev ? "予定を編集" : "予定を追加";

    selectedColor = ev?.color || CARD_COLORS[0];
    renderColorPalette();

    renderPlaceOptions(ev?.place || "");
    renderCompanyOptions(ev?.company || ev?.assignee || "");
    renderContentOptions(ev?.content || ev?.title || "");
    renderPeopleOptions(ev?.people || "");

    eventId.value = ev?.id || "";
    dateInput.value = ev?.date || selectedDate;
    startInput.value = ev?.startTime || "";
    endInput.value = ev?.endTime || "";
    placeInput.value = ev?.place || "";

    const placeItem = getPlaceItem(placeInput.value) || {};
    placeSubInput.value = ev?.placeSub || placeItem.sub || "";
    placeAddressInput.value = ev?.placeAddress || placeItem.address || "";
    keyNumberInput.value = ev?.keyNumber || placeItem.key || "";

    companyInput.value = ev?.company || ev?.assignee || "";
    userInput.value = removeSama(ev?.user || "");
    peopleInput.value = ev?.people || "";
    contentInput.value = ev?.content || ev?.title || "";
    noteInput.value = ev?.note || "";

    document.getElementById("deleteBtn").style.visibility = ev ? "visible" : "hidden";
    sheetBackdrop.classList.add("show");
  }

  function renderColorPalette() {
    colorPalette.innerHTML = "";
    for (const color of CARD_COLORS) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "color-dot" + (color === selectedColor ? " selected" : "");
      btn.style.setProperty("--dot", color);
      btn.setAttribute("aria-label", color);
      btn.onclick = () => {
        selectedColor = color;
        renderColorPalette();
      };
      colorPalette.appendChild(btn);
    }
  }

  function closeSheet() {
    sheetBackdrop.classList.remove("show");
  }

  function saveEvent() {
    const id = eventId.value || makeId();

    const ev = {
      id,
      date: dateInput.value,
      startTime: startInput.value,
      endTime: endInput.value,
      place: placeInput.value,
      placeSub: placeSubInput.value.trim(),
      placeAddress: placeAddressInput.value.trim(),
      keyNumber: keyNumberInput.value.trim(),
      company: companyInput.value,
      user: formatUserName(userInput.value.trim()),
      people: peopleInput.value,
      content: contentInput.value,
      color: selectedColor,
      note: noteInput.value.trim()
    };

    if (!ev.date) {
      alert("日付を入力してください。");
      return;
    }

    const index = events.findIndex(e => e.id === id);
    if (index >= 0) events[index] = ev;
    else events.push(ev);

    selectedDate = ev.date;
    current = new Date(ev.date + "T00:00:00");
    resetDateWindowAroundCurrent();
    saveEvents();
    closeSheet();
    render();
  }

  function deleteEvent() {
    const id = eventId.value;
    if (!id) return;

    if (!confirm("この予定を削除しますか？")) return;

    events = events.filter(e => e.id !== id);
    saveEvents();
    closeSheet();
    render();
  }

  function getPlaceItems() {
    return settings.placeItems;
  }

  function getPlaceItem(name) {
    return getPlaceItems().find(item => item.name === name);
  }

  function renderPlaceOptions(selectedValue = "") {
    const values = uniqueObjectsByName([...getPlaceItems(), { name: selectedValue, sub: "", address: "" }].filter(x => x.name));
    placeInput.innerHTML =
      `<option value="">選択してください</option>` +
      values.map(v => {
        return `<option value="${escapeAttr(v.name)}">${escapeHtml(v.name)}</option>`;
      }).join("");
  }

  function renderCompanyOptions(selectedValue = "") {
    const values = unique([...settings.companies, selectedValue].filter(Boolean));
    companyInput.innerHTML = `<option value="">選択してください</option>` + values.map(v => `<option value="${escapeAttr(v)}">${escapeHtml(v)}</option>`).join("");
  }

  function renderContentOptions(selectedValue = "") {
    const values = unique([...settings.contents, selectedValue].filter(Boolean));
    contentInput.innerHTML = `<option value="">選択してください</option>` + values.map(v => `<option value="${escapeAttr(v)}">${escapeHtml(v)}</option>`).join("");
  }

  function renderPeopleOptions(selectedValue = "") {
    let html = `<option value="">未入力</option>`;
    for (let i = 1; i <= 20; i++) html += `<option value="${i}">${i}名</option>`;
    peopleInput.innerHTML = html;
    peopleInput.value = selectedValue || "";
  }

  function setupPlaceAddDeleteButton() {
    const btn = document.getElementById("addPlaceBtn");
    let timer = null;
    let longPressed = false;

    btn.addEventListener("click", () => {
      if (longPressed) {
        longPressed = false;
        return;
      }

      const name = prompt("場所・物件を追加", "");
      if (!name || !name.trim()) return;

      const sub = prompt("建物名・屋号など", "") || "";
      const address = prompt("住所・番号など", "") || "";
      const key = prompt("鍵番号", "") || "";

      upsertPlaceItem({
        name: name.trim(),
        sub: sub.trim(),
        address: address.trim(),
        key: key.trim()
      });

      renderPlaceOptions(name.trim());
      placeInput.value = name.trim();
      placeSubInput.value = sub.trim();
      placeAddressInput.value = address.trim();
      keyNumberInput.value = key.trim();
    });

    btn.addEventListener("pointerdown", () => {
      longPressed = false;
      timer = setTimeout(() => {
        longPressed = true;
        editSelectedPlaceItem();
      }, 650);
    });

    btn.addEventListener("pointerup", () => clearTimeout(timer));
    btn.addEventListener("pointercancel", () => clearTimeout(timer));
    btn.addEventListener("pointerleave", () => clearTimeout(timer));
  }

  function editSelectedPlaceItem() {
    const oldName = placeInput.value;
    if (!oldName) {
      alert("編集する場所を選択してください。");
      return;
    }

    const current = getPlaceItem(oldName) || {
      name: oldName,
      sub: placeSubInput.value || "",
      address: placeAddressInput.value || "",
      key: keyNumberInput.value || ""
    };

    const newNameRaw = prompt("場所・物件を編集\n※空にしてOKを押すと削除", current.name);
    if (newNameRaw === null) return;

    const newName = newNameRaw.trim();

    if (!newName) {
      deletePlaceItemByName(oldName);
      return;
    }

    const newSub = prompt("建物名・屋号など", current.sub || "") ?? current.sub ?? "";
    const newAddress = prompt("住所・番号など", current.address || "") ?? current.address ?? "";
    const newKey = prompt("鍵番号", current.key || "") ?? current.key ?? "";

    const edited = {
      name: newName,
      sub: String(newSub).trim(),
      address: String(newAddress).trim(),
      key: String(newKey).trim()
    };

    settings.placeItems = settings.placeItems.filter(item => item.name !== oldName);
    settings.placeItems.push(edited);
    saveSettings();

    events = events.map(ev => {
      if (ev.place !== oldName) return ev;
      return {
        ...ev,
        place: edited.name,
        placeSub: edited.sub,
        placeAddress: edited.address,
        keyNumber: edited.key
      };
    });
    saveEvents();

    renderPlaceOptions(edited.name);
    placeInput.value = edited.name;
    placeSubInput.value = edited.sub;
    placeAddressInput.value = edited.address;
    keyNumberInput.value = edited.key;
    render();
  }

  function deletePlaceItemByName(name) {
    if (!confirm(`「${name}」を場所リストから削除しますか？\n建物名・番号・鍵番号の紐づく設定も削除されます。`)) return;

    settings.placeItems = settings.placeItems.filter(item => item.name !== name);
    saveSettings();

    events = events.map(ev => {
      if (ev.place !== name) return ev;
      return {
        ...ev,
        placeSub: "",
        placeAddress: "",
        keyNumber: ""
      };
    });
    saveEvents();

    placeInput.value = "";
    placeSubInput.value = "";
    placeAddressInput.value = "";
    keyNumberInput.value = "";
    renderPlaceOptions("");
    render();
  }

  function upsertPlaceItem(item) {
    const index = settings.placeItems.findIndex(x => x.name === item.name);
    if (index >= 0) settings.placeItems[index] = item;
    else settings.placeItems.push(item);
    saveSettings();
  }

  function deleteSelectedPlaceItem() {
    const value = placeInput.value;
    if (!value) return;
    deletePlaceItemByName(value);
  }

  function setupAddDeleteButton(buttonId, type, promptText, selectEl, renderFn) {
    const btn = document.getElementById(buttonId);
    let timer = null;
    let longPressed = false;

    btn.addEventListener("click", () => {
      if (longPressed) {
        longPressed = false;
        return;
      }
      const name = prompt(promptText, "");
      if (!name || !name.trim()) return;
      addOption(type, name.trim());
      renderFn(name.trim());
      selectEl.value = name.trim();
    });

    btn.addEventListener("pointerdown", () => {
      longPressed = false;
      timer = setTimeout(() => {
        longPressed = true;
        editSelectedOption(type, selectEl, renderFn);
      }, 650);
    });

    btn.addEventListener("pointerup", () => clearTimeout(timer));
    btn.addEventListener("pointercancel", () => clearTimeout(timer));
    btn.addEventListener("pointerleave", () => clearTimeout(timer));
  }

  function editSelectedOption(type, selectEl, renderFn) {
    const oldValue = selectEl.value;
    if (!oldValue) {
      alert("編集する項目を選択してください。");
      return;
    }

    const newValueRaw = prompt("項目を編集\n※空にしてOKを押すと削除", oldValue);
    if (newValueRaw === null) return;

    const newValue = newValueRaw.trim();

    if (!newValue) {
      deleteOptionByValue(type, oldValue, selectEl, renderFn);
      return;
    }

    settings[type] = unique(settings[type].map(v => v === oldValue ? newValue : v));
    saveSettings();

    if (type === "companies") {
      events = events.map(ev => ev.company === oldValue ? { ...ev, company: newValue } : ev);
      companyInput.value = newValue;
    }

    if (type === "contents") {
      events = events.map(ev => ev.content === oldValue ? { ...ev, content: newValue } : ev);
      contentInput.value = newValue;
    }

    saveEvents();
    renderFn(newValue);
    selectEl.value = newValue;
    render();
  }

  function deleteOptionByValue(type, value, selectEl, renderFn) {
    if (!confirm(`「${value}」をリストから削除しますか？`)) return;

    settings[type] = settings[type].filter(v => v !== value);
    saveSettings();

    if (type === "companies") {
      events = events.map(ev => ev.company === value ? { ...ev, company: "" } : ev);
    }

    if (type === "contents") {
      events = events.map(ev => ev.content === value ? { ...ev, content: "" } : ev);
    }

    saveEvents();
    selectEl.value = "";
    renderFn("");
    render();
  }

  function deleteSelectedOption(type, selectEl, renderFn) {
    const value = selectEl.value;
    if (!value) return;
    deleteOptionByValue(type, value, selectEl, renderFn);
  }

  function addOption(type, value) {
    if (!settings[type].includes(value)) {
      settings[type].push(value);
      saveSettings();
    }
  }

  function loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
      if (saved?.companies && saved?.placeItems) {
        return {
          companies: saved.companies,
          contents: saved.contents,
          placeItems: saved.placeItems
        };
      }
    } catch {}

    return {
      companies: DEFAULT_COMPANIES.slice(),
      contents: DEFAULT_CONTENTS.slice(),
      placeItems: DEFAULT_PLACE_ITEMS.slice()
    };
  }

  function saveSettings() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    } catch {
      alert("設定を保存できませんでした。Safari/ChromeでGitHub PagesのURLから開いてください。");
    }
  }

  function exportBackup() {
    const data = {
      app: "Schedule Board",
      version: 27,
      exportedAt: new Date().toISOString(),
      settings,
      events
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `schedule_backup_${toDateString(new Date())}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;

    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const importedEvents = Array.isArray(data) ? data : data.events;

      if (!Array.isArray(importedEvents)) throw new Error("events が見つかりません");
      if (!confirm("現在の予定をバックアップ内容で置き換えますか？")) return;

      events = importedEvents.map(normalizeEvent);

      if (data.settings) {
        settings = {
          companies: Array.isArray(data.settings.companies) ? data.settings.companies : settings.companies,
          contents: Array.isArray(data.settings.contents) ? data.settings.contents : settings.contents,
          placeItems: Array.isArray(data.settings.placeItems)
            ? uniqueObjectsByName(data.settings.placeItems)
            : settings.placeItems
        };
        saveSettings();
      }

      saveEvents();
      render();
      alert("復元しました。");
    } catch (err) {
      alert("復元に失敗しました。JSONファイルを確認してください。");
    } finally {
      e.target.value = "";
    }
  }

  function loadEvents() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw !== null) {
        const data = JSON.parse(raw);
        if (Array.isArray(data)) return data;
      }
    } catch {}

    return [];
  }

  function normalizeEvent(e) {
    const item = getPlaceItemFromArray(e.place, settings?.placeItems || DEFAULT_PLACE_ITEMS) || {};
    return {
      ...e,
      company: e.company || e.assignee || "",
      content: e.content || e.title || "",
      user: formatUserName(e.user || ""),
      color: e.color || CARD_COLORS[0],
      placeSub: e.placeSub || item.sub || "",
      placeAddress: e.placeAddress || item.address || "",
      keyNumber: e.keyNumber || item.key || ""
    };
  }

  function saveEvents() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    } catch {
      alert("予定を保存できませんでした。Safari/ChromeでGitHub PagesのURLから開いてください。");
    }
  }

  function formatUserName(name) {
    const n = String(name || "").trim();
    if (!n) return "";
    if (n.endsWith("様")) return n;
    return n + "様";
  }

  function removeSama(name) {
    return String(name || "").replace(/様$/, "");
  }

  function normalizeTimeInput(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";

    const normalized = raw.replace("：", ":");

    const compact = normalized.match(/^(\d{1,2})(\d{2})$/);
    if (compact) {
      const h = Number(compact[1]);
      const m = Number(compact[2]);
      if (h >= 0 && h <= 23 && m >= 0 && m <= 59) {
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
      }
    }

    const colon = normalized.match(/^(\d{1,2}):(\d{1,2})$/);
    if (colon) {
      const h = Number(colon[1]);
      const m = Number(colon[2]);
      if (h >= 0 && h <= 23 && m >= 0 && m <= 59) {
        return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
      }
    }

    return raw;
  }

  function toDateString(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function formatDateLabel(dateStr) {
    const date = new Date(dateStr + "T00:00:00");
    const week = ["日","月","火","水","木","金","土"][date.getDay()];
    return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日（${week}）`;
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[s]));
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/`/g, "&#096;");
  }

  function unique(arr) {
    return [...new Set(arr.map(v => String(v).trim()).filter(Boolean))];
  }

  function uniqueObjectsByName(arr) {
    const map = new Map();
    for (const item of arr) {
      if (!item || !String(item.name || "").trim()) continue;
      const name = String(item.name).trim();
      map.set(name, {
        name,
        sub: String(item.sub || "").trim(),
        address: String(item.address || "").trim(),
        key: String(item.key || "").trim()
      });
    }
    return [...map.values()];
  }

  function getPlaceItemFromArray(name, arr) {
    return (arr || []).find(item => item.name === name);
  }

  function makeId() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "evt_" + Date.now() + "_" + Math.random().toString(16).slice(2);
  }

  function migrateLocalStorageToStableKeys() {
    if (!isLocalStorageAvailable()) {
      alert("この開き方では保存が残らない可能性があります。GitHub PagesなどのURLからSafari/Chromeで開いてください。");
      return;
    }
  }

  function isLocalStorageAvailable() {
    try {
      const testKey = "__schedule_storage_test__";
      localStorage.setItem(testKey, "1");
      localStorage.removeItem(testKey);
      return true;
    } catch {
      return false;
    }
  }

  function monthStart(date) {
    return new Date(date.getFullYear(), date.getMonth(), 1);
  }

  function addMonths(date, amount) {
    return new Date(date.getFullYear(), date.getMonth() + amount, 1);
  }

  function resetDateWindowAroundCurrent() {
    renderedStartMonth = monthStart(addMonths(current, -1));
    renderedEndMonth = monthStart(addMonths(current, 1));
  }

  function rebuildDateStrip() {
    dateStrip.innerHTML = "";

    const startDate = new Date(renderedStartMonth);
    const endDate = new Date(renderedEndMonth.getFullYear(), renderedEndMonth.getMonth() + 1, 0);

    for (let date = new Date(startDate); date <= endDate; date.setDate(date.getDate() + 1)) {
      dateStrip.appendChild(createDateButton(new Date(date)));
    }
  }

  function createDateButton(dateObj) {
    const dateStr = toDateString(dateObj);
    const count = events.filter(e => e.date === dateStr).length;

    const btn = document.createElement("button");
    btn.className =
      "date-btn" +
      (dateStr === selectedDate ? " active" : "") +
      (count > 0 ? " has-events" : "");
    btn.dataset.date = dateStr;

    btn.innerHTML = `
      <div class="day">${dateObj.getDate()}</div>
      <div class="week">${["日","月","火","水","木","金","土"][dateObj.getDay()]}${count ? "・" + count : ""}</div>
    `;

    return btn;
  }

  function appendDateMonths(count = 3) {
    if (isExtendingDateStrip) return;
    isExtendingDateStrip = true;

    const start = addMonths(renderedEndMonth, 1);
    const end = addMonths(renderedEndMonth, count);
    const lastDay = new Date(end.getFullYear(), end.getMonth() + 1, 0);

    const frag = document.createDocumentFragment();
    for (let date = new Date(start); date <= lastDay; date.setDate(date.getDate() + 1)) {
      frag.appendChild(createDateButton(new Date(date)));
    }

    dateStrip.appendChild(frag);
    renderedEndMonth = monthStart(end);
    isExtendingDateStrip = false;
  }

  function prependDateMonths(count = 3) {
    if (isExtendingDateStrip) return;
    isExtendingDateStrip = true;

    const oldScrollWidth = dateStrip.scrollWidth;

    const start = addMonths(renderedStartMonth, -count);
    const end = addMonths(renderedStartMonth, -1);
    const lastDay = new Date(end.getFullYear(), end.getMonth() + 1, 0);

    const frag = document.createDocumentFragment();
    for (let date = new Date(start); date <= lastDay; date.setDate(date.getDate() + 1)) {
      frag.appendChild(createDateButton(new Date(date)));
    }

    dateStrip.prepend(frag);
    renderedStartMonth = monthStart(start);

    const addedWidth = dateStrip.scrollWidth - oldScrollWidth;
    dateStrip.scrollLeft += addedWidth;

    isExtendingDateStrip = false;
  }

  function ensureDateStripBuffer() {
    const maxScroll = dateStrip.scrollWidth - dateStrip.clientWidth;
    const threshold = 900;

    if (dateStrip.scrollLeft > maxScroll - threshold) {
      appendDateMonths(3);
    }

    if (dateStrip.scrollLeft < threshold) {
      prependDateMonths(3);
    }
  }

  function updateMonthLabelByStripCenter() {
    const centerX = dateStrip.scrollLeft + dateStrip.clientWidth / 2;
    const firstDayButtons = [...dateStrip.querySelectorAll(".date-btn")]
      .filter(btn => btn.dataset.date && btn.dataset.date.endsWith("-01"));

    let candidate = null;

    for (const btn of firstDayButtons) {
      const btnCenter = btn.offsetLeft + btn.offsetWidth / 2;
      if (btnCenter <= centerX) {
        candidate = btn;
      } else {
        break;
      }
    }

    if (!candidate && firstDayButtons.length) {
      candidate = firstDayButtons[0];
    }

    if (!candidate) return;

    const date = new Date(candidate.dataset.date + "T00:00:00");
    current = date;
    monthLabel.textContent = `${date.getFullYear()}年${date.getMonth() + 1}月`;
  }

  function selectDateWithoutRebuildingStrip(dateStr) {
    selectedDate = dateStr;
    current = new Date(dateStr + "T00:00:00");
    monthLabel.textContent = `${current.getFullYear()}年${current.getMonth() + 1}月`;
    updateDateActiveStates();
    renderEvents();
  }

  function updateDateActiveStates() {
    const buttons = dateStrip.querySelectorAll(".date-btn");
    buttons.forEach(btn => {
      btn.classList.toggle("active", btn.dataset.date === selectedDate);
    });
  }

  function scrollCurrentMonthStartIntoView() {
    const y = current.getFullYear();
    const m = String(current.getMonth() + 1).padStart(2, "0");
    const first = dateStrip.querySelector(`[data-date="${y}-${m}-01"]`);
    if (first) {
      dateStrip.scrollLeft = Math.max(0, first.offsetLeft - dateStrip.offsetLeft);
    }
  }

  // ── 日付ストリップのドラッグスクロール（慣性 + 月またぎ）──────────
  function setupDateStripDragScroll() {
    let isDown = false;
    let startX = 0;
    let startScrollLeft = 0;
    let moved = false;
    let activePointerId = null;

    // 慣性用
    let lastX = 0;
    let lastT = 0;
    let velocity = 0;  // px/ms
    let rafId = null;

    function cancelMomentum() {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    }

    // 端に近づいたら3か月ずつ追加描画する
    function checkEdgeOverflow() {
      ensureDateStripBuffer();
      updateMonthLabelByStripCenter();
    }

    function startMomentum(v) {
      cancelMomentum();
      velocity = v;

      function step() {
        if (Math.abs(velocity) < 0.04) { velocity = 0; return; }
        dateStrip.scrollLeft += velocity * 16;
        velocity *= 0.88;  // 摩擦係数
        checkEdgeOverflow();
        rafId = requestAnimationFrame(step);
      }
      rafId = requestAnimationFrame(step);
    }

    let downDateStr = null; // pointerdown時の日付文字列を記憶

    dateStrip.addEventListener("pointerdown", (e) => {
      cancelMomentum();
      isDown = true;
      moved = false;
      startX = lastX = e.clientX;
      lastT = e.timeStamp;
      startScrollLeft = dateStrip.scrollLeft;
      activePointerId = e.pointerId;
      velocity = 0;
      // setPointerCapture するとpointerup時にe.targetがdateStrip自身になるため
      // 押した瞬間の日付文字列をここで記憶しておく
      const btn = e.target.closest(".date-btn");
      downDateStr = btn ? btn.dataset.date : null;
      dateStrip.classList.add("dragging");
      try { dateStrip.setPointerCapture(e.pointerId); } catch {}
    });

    dateStrip.addEventListener("pointermove", (e) => {
      if (!isDown || e.pointerId !== activePointerId) return;

      const dx = e.clientX - startX;
      if (Math.abs(dx) > 6) moved = true;

      if (moved) {
        // 速度計算（直近フレームの変位）
        const dt = e.timeStamp - lastT || 1;
        velocity = -(e.clientX - lastX) / dt;
        lastX = e.clientX;
        lastT = e.timeStamp;

        dateStrip.scrollLeft = startScrollLeft - dx;
        ensureDateStripBuffer();
        updateMonthLabelByStripCenter();
      }
    });

    dateStrip.addEventListener("pointerup", (e) => {
      if (!isDown || e.pointerId !== activePointerId) return;

      const wasMoved = moved;
      isDown = false;
      moved = false;
      activePointerId = null;
      dateStrip.classList.remove("dragging");
      try { dateStrip.releasePointerCapture(e.pointerId); } catch {}

      if (!wasMoved) {
        if (downDateStr) {
          selectDateWithoutRebuildingStrip(downDateStr);
        }
      } else {
        // 指を離したら慣性スクロール開始
        startMomentum(velocity);
      }
      downDateStr = null;
    });

    dateStrip.addEventListener("pointercancel", () => {
      isDown = false;
      moved = false;
      activePointerId = null;
      dateStrip.classList.remove("dragging");
      cancelMomentum();
    });

    dateStrip.addEventListener("scroll", () => {
      ensureDateStripBuffer();
      updateMonthLabelByStripCenter();
    }, { passive: true });

    // トラックパッド・ホイールでも横スクロール（月またぎつき）
    dateStrip.addEventListener("wheel", (e) => {
      if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        cancelMomentum();
        dateStrip.scrollLeft += e.deltaY;
        velocity = e.deltaY / 16;
        ensureDateStripBuffer();
        updateMonthLabelByStripCenter();
        e.preventDefault();
      }
    }, { passive: false });
  }

  function scrollActiveDateIntoView() {
    const active = document.querySelector(".date-btn.active");
    if (!active) return;

    const target = active.offsetLeft - dateStrip.offsetLeft - (dateStrip.clientWidth / 2) + (active.clientWidth / 2);
    dateStrip.scrollLeft = Math.max(0, target);
    ensureDateStripBuffer();
    updateMonthLabelByStripCenter();
  }

  setupDateStripDragScroll();
  migrateLocalStorageToStableKeys();
  render();
  setTimeout(scrollActiveDateIntoView, 100);
</script>
